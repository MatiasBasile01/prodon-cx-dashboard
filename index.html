<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Prodon Support Metrics · CX Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f2;--surface:#fff;--border:#e5e4e0;--border2:#d0cfc9;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9e9d97;
  --purple:#7F77DD;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --teal:#1D9E75;--teal-l:#E1F5EE;
  --blue:#378ADD;--blue-l:#E6F1FB;
  --coral:#D85A30;--coral-l:#FAECE7;
  --green:#3B6D11;--green-l:#EAF3DE;
  --red:#A32D2D;--red-l:#FCEBEB;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --r:10px;--rs:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.5rem .75rem;position:sticky;top:0;z-index:10}
.h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.h-title{font-size:17px;font-weight:600}
.h-sub{font-size:12px;color:var(--text2);margin-top:2px}
.badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--blue-l);color:#185FA5}
.frow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tbtn{padding:4px 14px;font-size:12px;border-radius:20px;cursor:pointer;font-weight:500;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all .15s}
.tbtn.on{border-color:var(--purple);background:var(--purple-l);color:var(--purple-d)}
select{padding:4px 10px;font-size:12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;outline:none}
.body{padding:1.25rem 1.5rem;max-width:1100px;margin:0 auto}
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
@media(max-width:700px){.kgrid{grid-template-columns:repeat(2,1fr)}}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;border-top-width:3px}
.ktop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.klbl{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.kval{font-size:28px;font-weight:600;line-height:1;margin-bottom:2px}
.kdesc{font-size:11px;color:var(--text3);margin-bottom:8px}
.kbadge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.ok{background:var(--green-l);color:var(--green)}
.ko{background:var(--red-l);color:var(--red)}
.ktrend{font-size:11px;font-weight:500;margin-top:4px}
.row2{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:700px){.row2{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem}
.ctitle{font-size:13px;font-weight:600;margin-bottom:2px}
.csub{font-size:11px;color:var(--text2);margin-bottom:10px}
.chtabs{display:flex;gap:6px;margin-bottom:8px}
.chtab{padding:3px 10px;font-size:11px;border-radius:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2)}
.chtab.on{background:#f0eff8;border-color:var(--purple);color:var(--purple-d);font-weight:500}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:6px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.ld{width:8px;height:8px;border-radius:2px;display:inline-block}
.ggrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.gi{text-align:center;padding:6px 0}
.gl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.irow{display:flex;gap:8px;margin-top:8px}
.ichip{flex:1;background:var(--bg);border-radius:8px;padding:8px 10px}
.icl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.icv{font-size:18px;font-weight:600;color:var(--text)}
.err{background:var(--red-l);color:var(--red);padding:1rem;border-radius:var(--r);font-size:13px;margin-bottom:12px;display:none}
.loading{display:flex;align-items:center;justify-content:center;height:200px;font-size:14px;color:var(--text2)}
</style>
</head>
<body>
<div class="header">
  <div class="h-top">
    <div><div class="h-title">Prodon Support Metrics</div><div class="h-sub">CX Dashboard · 2025–2026</div></div>
    <span class="badge" id="pbadge">Cargando...</span>
  </div>
  <div class="frow">
    <button class="tbtn on" id="bm" onclick="setView('mensual')">Mensual</button>
    <button class="tbtn" id="bs" onclick="setView('semanal')">Semanal</button>
    <select id="sm" onchange="onFC()"></select>
    <select id="sw" style="display:none" onchange="onFC()"></select>
  </div>
</div>
<div class="body">
  <div class="err" id="err"></div>
  <div class="loading" id="loading">Cargando datos desde Google Sheets...</div>
  <div id="dash" style="display:none">
    <div class="kgrid" id="kg"></div>
    <div class="row2">
      <div class="card">
        <div class="ctitle">Evolución de KPIs</div>
        <div class="csub">Período seleccionado · semanas</div>
        <div class="chtabs">
          <button class="chtab on" onclick="setCM('all')">Todos</button>
          <button class="chtab" onclick="setCM('csat')">CSAT</button>
          <button class="chtab" onclick="setCM('sla')">SLA</button>
          <button class="chtab" onclick="setCM('ttr')">TTR</button>
        </div>
        <div class="legend" id="leg"></div>
        <svg id="lc" viewBox="0 0 600 180" style="width:100%;height:180px"></svg>
      </div>
      <div class="card">
        <div class="ctitle">Estado vs. target</div>
        <div class="csub">Promedio del período</div>
        <div class="ggrid" id="gg"></div>
        <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em">Incoming acumulado</div>
        <div class="irow" id="ic"></div>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">Incoming tickets — volumen semanal</div>
      <div class="csub">Tickets creados por semana · Prodon</div>
      <svg id="bc" viewBox="0 0 600 130" style="width:100%;height:130px"></svg>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
// ── DATA (hardcoded fallback — also fetched live below) ──────────────────────
const STATIC = {
  weeks:[
    {l:"W32",s:"4-ago",m:"ago-25"},{l:"W33",s:"11-ago",m:"ago-25"},
    {l:"W34",s:"18-ago",m:"ago-25"},{l:"W35",s:"25-ago",m:"ago-25"},
    {l:"W36",s:"1-sep",m:"sep-25"},{l:"W37",s:"8-sep",m:"sep-25"},
    {l:"W38",s:"15-sep",m:"sep-25"},{l:"W39",s:"22-sep",m:"sep-25"},{l:"W40",s:"29-sep",m:"sep-25"},
    {l:"W41",s:"6-oct",m:"oct-25"},{l:"W42",s:"13-oct",m:"oct-25"},
    {l:"W43",s:"20-oct",m:"oct-25"},{l:"W44",s:"27-oct",m:"oct-25"},
    {l:"W45",s:"3-nov",m:"nov-25"},{l:"W46",s:"10-nov",m:"nov-25"},
    {l:"W47",s:"17-nov",m:"nov-25"},{l:"W48",s:"24-nov",m:"nov-25"},
    {l:"W49",s:"1-dic",m:"dic-25"},{l:"W50",s:"8-dic",m:"dic-25"},
    {l:"W51",s:"15-dic",m:"dic-25"},{l:"W52",s:"22-dic",m:"dic-25"},{l:"W53",s:"29-dic",m:"dic-25"},
    {l:"W1",s:"5-ene",m:"ene-26"},{l:"W2",s:"12-ene",m:"ene-26"},
    {l:"W3",s:"19-ene",m:"ene-26"},{l:"W4",s:"26-ene",m:"ene-26"},
    {l:"W5",s:"2-feb",m:"feb-26"},{l:"W6",s:"9-feb",m:"feb-26"},
    {l:"W7",s:"16-feb",m:"feb-26"},{l:"W8",s:"23-feb",m:"feb-26"},
    {l:"W9",s:"2-mar",m:"mar-26"},{l:"W10",s:"9-mar",m:"mar-26"},
    {l:"W11",s:"16-mar",m:"mar-26"},{l:"W12",s:"23-mar",m:"mar-26"},{l:"W13",s:"30-mar",m:"mar-26"},
    {l:"W14",s:"6-abr",m:"abr-26"},{l:"W15",s:"13-abr",m:"abr-26"},
    {l:"W16",s:"20-abr",m:"abr-26"},{l:"W17",s:"27-abr",m:"abr-26"},
    {l:"W18",s:"4-may",m:"may-26"},
  ],
  csat:[93.5,93.1,94.0,96.3,94.6,94.9,91.0,96.0,94.5,92.0,94.2,95.7,97.6,94.8,96.3,96.8,95.7,98.6,95.8,null,99.0,95.3,88.6,92.3,95.3,96.7,90.6,95.2,98.6,94.8,96.7,97.2,97.2,98.2,97.3,94.0,93.6,98.5,96.8,95.3,95.0,95.7,94.4,98.0,94.3,96.2,97.8],
  sla:[85,86,80,81,82,86,87,85,83,89,85,86,85,81,82,84,87,87,88,90,87,81,87,87,72,67,83,90,88,92,88,89,86,89,88,89,88,88,95,90,92,91,93,88,81,82,92,85,86],
  ttr:[86,90,84,85,86,88,90,91,91,94,90,93,93,88,90,91,91,93,94,95,93,93,95,93,83,83,81,92,95,94,95,94,94,95,94,95,95,96,98,96,96,96,95,96,93,93,94,94,96],
  incoming:[654,638,895,693,640,595,666,572,566,504,610,751,768,660,630,524,599,589,501,450,308,312,485,559,482,551,554,618,470,628,702,626,670,630,553,681,723,663,459,731,null,null,null,null,null,null,null,null,null],
};

let S = {
  weeks:[], data:{csat:[],sla:[],ttr:[],incoming:[]},
  view:"mensual", month:null, week:0, cm:"all"
};

// ── UTILS ────────────────────────────────────────────────────────────────────
const avg = a=>{const v=a.filter(x=>x!=null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null};
const sum = a=>a.filter(x=>x!=null).reduce((a,b)=>a+b,0);
const lastV = a=>{for(let i=a.length-1;i>=0;i--)if(a[i]!=null)return a[i];return null};
const trnd = a=>{const v=a.filter(x=>x!=null);return v.length>=2?v[v.length-1]-v[v.length-2]:0};
const pnum = s=>{
  if(!s||[".","–","-","#VALUE!","#DIV/0!","#REF!"].includes(s.trim())) return null;
  const n=parseFloat(s.replace(/\./g,"").replace(",",".").replace("%","").trim());
  return isNaN(n)?null:n;
};
const mLabel = id=>{
  const m={ago:"Agosto",sep:"Septiembre",oct:"Octubre",nov:"Noviembre",dic:"Diciembre",
    ene:"Enero",feb:"Febrero",mar:"Marzo",abr:"Abril",may:"Mayo",jun:"Junio",jul:"Julio"};
  const[p,y]=id.split("-");return(m[p]||p)+(y?" 20"+y:"");
};

// ── LOAD ─────────────────────────────────────────────────────────────────────
function loadData(){
  Papa.parse("/api/csv",{
    download:true, skipEmptyLines:true,
    complete(res){
      try{ parseCSV(res.data); }
      catch(e){
        console.warn("CSV parse failed, using static data:",e.message);
        useStatic();
      }
    },
    error(e){ console.warn("CSV fetch failed, using static:",e); useStatic(); }
  });
}

function useStatic(){
  const W=STATIC.weeks.length;
  const pad=a=>{const o=[...a];while(o.length<W)o.push(null);return o.slice(0,W);};
  S.weeks=STATIC.weeks.map(w=>({label:w.l,short:w.s,month:w.m}));
  S.data={csat:pad(STATIC.csat),sla:pad(STATIC.sla),ttr:pad(STATIC.ttr),incoming:pad(STATIC.incoming)};
  S.week=S.weeks.length-1;
  const ms=[...new Set(S.weeks.map(w=>w.month))];
  S.month=ms[ms.length-1];
  boot();
}

function parseCSV(rows){
  // Find rows by keyword
  const findR=kw=>rows.find(r=>r[0]&&r[0].toLowerCase().includes(kw.toLowerCase()));
  const incomRow=findR("Incoming");
  if(!incomRow) throw new Error("Sin fila Incoming");

  // Prodon columns
  const pCols=incomRow.map((v,i)=>v==="Prodon"?i:null).filter(v=>v!==null);
  if(!pCols.length) throw new Error("Sin columnas Prodon");

  const csatRow = findR("CSAT 94%")||findR("csat consolidado");
  const slaRow  = findR("SLA Att");
  const ttrRow  = findR("TTR en Target");
  const tickRow = findR("# Tickets Created");
  if(!csatRow||!slaRow||!ttrRow||!tickRow) throw new Error("Faltan filas KPI");

  // Date row: row[0]==="Week" with actual dates in prodon columns
  const dateRow=rows.find(r=>r[0]==="Week"&&pCols.some(c=>r[c]&&r[c].trim()!==""));
  // Month row
  const mRow=rows.find(r=>r[0]==="[AR] Prodon");

  const weeks=[],csat=[],sla=[],ttr=[],inc=[];
  for(const c of pCols){
    const dt=(dateRow?dateRow[c]||"":"").trim().replace(/-$/,"");
    // Month
    let mName="";
    if(mRow){for(let i=c;i>=0;i--){const v=(mRow[i]||"").trim();if(v&&(v.includes("2025")||v.includes("2026"))){mName=v;break;}}}
    const mId=toMonthId(mName);
    weeks.push({label:"W"+(weeks.length+1),short:dt||("col"+c),month:mId});
    csat.push(pnum(csatRow[c]));
    sla.push(pnum(slaRow[c]));
    ttr.push(pnum(ttrRow[c]));
    inc.push(pnum(tickRow[c]));
  }
  if(!weeks.length) throw new Error("Sin semanas");
  S.weeks=weeks; S.data={csat,sla,ttr,incoming:inc};
  S.week=weeks.length-1;
  const ms=[...new Set(weeks.map(w=>w.month))];
  S.month=ms[ms.length-1];
  boot();
}

function toMonthId(s){
  if(!s) return "?";
  s=s.toLowerCase();
  const m={agosto:"ago",septiembre:"sep",octubre:"oct",noviembre:"nov",diciembre:"dic",
    enero:"ene",febrero:"feb",marzo:"mar",abril:"abr",mayo:"may",junio:"jun",julio:"jul"};
  for(const[k,v]of Object.entries(m)){if(s.includes(k)){const y=s.match(/\d{4}/);return y?v+"-"+y[0].slice(2):v;}}
  return s.slice(0,6);
}

function boot(){
  document.getElementById("loading").style.display="none";
  document.getElementById("dash").style.display="block";
  buildSelectors(); render();
}

function buildSelectors(){
  const ms=[...new Set(S.weeks.map(w=>w.month))];
  const sm=document.getElementById("sm");
  sm.innerHTML=ms.map(m=>`<option value="${m}">${mLabel(m)}</option>`).join("");
  sm.value=S.month;
  const sw=document.getElementById("sw");
  sw.innerHTML=S.weeks.map((w,i)=>`<option value="${i}">${w.label} · ${w.short}</option>`).join("");
  sw.value=S.week;
}

// ── CONTROLS ─────────────────────────────────────────────────────────────────
function setView(v){
  S.view=v;
  document.getElementById("bm").classList.toggle("on",v==="mensual");
  document.getElementById("bs").classList.toggle("on",v==="semanal");
  document.getElementById("sm").style.display=v==="mensual"?"":"none";
  document.getElementById("sw").style.display=v==="semanal"?"":"none";
  render();
}
function onFC(){
  S.month=document.getElementById("sm").value;
  S.week=+document.getElementById("sw").value;
  render();
}
function setCM(m){
  S.cm=m;
  document.querySelectorAll(".chtab").forEach((b,i)=>b.classList.toggle("on",["all","csat","sla","ttr"][i]===m));
  renderLC(); renderLeg();
}

// ── FILTERED DATA ─────────────────────────────────────────────────────────────
function fidxs(){
  if(S.view==="mensual") return S.weeks.map((w,i)=>w.month===S.month?i:null).filter(v=>v!==null);
  return [S.week];
}
function fd(){
  const ix=fidxs();
  return{labels:ix.map(i=>S.weeks[i].short),
    csat:ix.map(i=>S.data.csat[i]),sla:ix.map(i=>S.data.sla[i]),
    ttr:ix.map(i=>S.data.ttr[i]),incoming:ix.map(i=>S.data.incoming[i])};
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const f=fd();
  const pl=S.view==="mensual"?mLabel(S.month):S.weeks[S.week].label+" ("+S.weeks[S.week].short+")";
  document.getElementById("pbadge").textContent=pl;
  renderKPIs(f); renderLC(); renderLeg(); renderGauges(f); renderIC(f); renderBC();
}

function renderKPIs(f){
  const ks=[
    {k:"csat",l:"CSAT",d:"Satisfacción del cliente",t:94,c:"var(--purple)"},
    {k:"sla",l:"SLA Attainment",d:"Cumplimiento de SLA",t:90,c:"var(--teal)"},
    {k:"ttr",l:"TTR <48h",d:"Tickets resueltos en tiempo",t:90,c:"var(--blue)"},
    {k:"incoming",l:"Incoming",d:"Tickets recibidos",t:null,c:"var(--coral)"},
  ];
  document.getElementById("kg").innerHTML=ks.map(k=>{
    const v=k.k==="incoming"?sum(f[k.k]):avg(f[k.k]);
    const ok=k.t!=null&&v!=null?v>=k.t:null;
    const disp=k.k==="incoming"?(v!=null?Math.round(v).toLocaleString("es-AR"):"—"):(v!=null?v.toFixed(1)+"%":"—");
    const vc=ok===null?k.c:ok?"var(--green)":"var(--red)";
    const tr=trnd(S.data[k.k]);
    const tc=tr>0?"var(--green)":tr<0?"var(--red)":"var(--text3)";
    const sp=sparkSVG(S.data[k.k],k.c);
    const bh=ok!==null?`<span class="kbadge ${ok?"ok":"ko"}">${ok?"En target":"Bajo target"}</span>`:"";
    return `<div class="kcard" style="border-top-color:${k.c}">
      <div class="ktop"><span class="klbl">${k.l}</span>${bh}</div>
      <div class="kval" style="color:${vc}">${disp}</div>
      <div class="kdesc">${k.d}</div>
      <div>${sp}</div>
      <div class="ktrend" style="color:${tc}">${tr>0?"▲":tr<0?"▼":"–"} ${Math.abs(tr).toFixed(1)}${k.k!=="incoming"?"%":""} vs sem. ant.</div>
    </div>`;
  }).join("");
}

function sparkSVG(vals,color){
  const v=vals.map((x,i)=>({i,x})).filter(p=>p.x!=null);
  if(v.length<2)return"";
  const mn=Math.min(...v.map(p=>p.x)),mx=Math.max(...v.map(p=>p.x)),rng=mx-mn||1;
  const W=110,H=28,xs=i=>(i/(vals.length-1))*(W-4)+2,ys=x=>H-2-((x-mn)/rng)*(H-4);
  const pts=v.map(p=>`${xs(p.i).toFixed(1)},${ys(p.x).toFixed(1)}`).join(" ");
  const last=v[v.length-1];
  return `<svg width="${W}" height="${H}" style="display:block">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>
    <circle cx="${xs(last.i).toFixed(1)}" cy="${ys(last.x).toFixed(1)}" r="2.5" fill="${color}"/>
  </svg>`;
}

function renderLeg(){
  const m=S.cm;
  const its=m==="all"
    ?[{c:"var(--purple)",l:"CSAT"},{c:"var(--teal)",l:"SLA"},{c:"var(--blue)",l:"TTR"}]
    :[{c:m==="csat"?"var(--purple)":m==="sla"?"var(--teal)":"var(--blue)",l:m.toUpperCase()}];
  its.push({c:"#aaa",l:"Target",dash:true});
  document.getElementById("leg").innerHTML=its.map(x=>
    `<span class="li"><span class="ld" style="${x.dash?`border:1px dashed ${x.c};background:transparent`:`background:${x.c}`}"></span>${x.l}</span>`
  ).join("");
}

function renderLC(){
  const f=fd(),m=S.cm;
  const ds=m==="all"
    ?[{v:f.csat,c:"#7F77DD"},{v:f.sla,c:"#1D9E75"},{v:f.ttr,c:"#378ADD"}]
    :m==="csat"?[{v:f.csat,c:"#7F77DD"}]
    :m==="sla"?[{v:f.sla,c:"#1D9E75"}]
    :[{v:f.ttr,c:"#378ADD"}];
  const all=ds.flatMap(d=>d.v.filter(x=>x!=null));
  if(!all.length){document.getElementById("lc").innerHTML="";return;}
  const mn=Math.floor(Math.min(...all,90)*.95),mx=Math.ceil(Math.max(...all,m==="csat"?94:90)*1.02);
  const W=600,H=180,pl=34,pr=8,pt=8,pb=26,iW=W-pl-pr,iH=H-pt-pb;
  const lb=f.labels,xs=i=>(i/(lb.length-1||1))*iW,ys=v=>iH-((v-mn)/(mx-mn))*iH;
  let svg="";
  for(let i=0;i<5;i++){const v=mn+(mx-mn)*i/4;svg+=`<line x1="${pl}" y1="${pt+ys(v)}" x2="${pl+iW}" y2="${pt+ys(v)}" stroke="#e5e4e0" stroke-width="0.5"/><text x="${pl-4}" y="${pt+ys(v)+4}" text-anchor="end" font-size="9" fill="#9e9d97">${v.toFixed(0)}%</text>`;}
  lb.forEach((l,i)=>{if(i%(Math.ceil(lb.length/7))!==0)return;svg+=`<text x="${pl+xs(i)}" y="${pt+iH+16}" text-anchor="middle" font-size="9" fill="#9e9d97">${l}</text>`;});
  [90,...(m==="csat"?[94]:[])].forEach(t=>{svg+=`<line x1="${pl}" y1="${pt+ys(t)}" x2="${pl+iW}" y2="${pt+ys(t)}" stroke="#aaa" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>`;});
  ds.forEach(d=>{
    const vp=d.v.map((x,i)=>({i,x})).filter(p=>p.x!=null);if(!vp.length)return;
    const ar=`M${vp.map(p=>`${pl+xs(p.i)},${pt+ys(p.x)}`).join(" L")} L${pl+xs(vp[vp.length-1].i)},${pt+iH} L${pl+xs(vp[0].i)},${pt+iH} Z`;
    const ln=vp.map((p,i)=>`${i===0?"M":"L"}${pl+xs(p.i)},${pt+ys(p.x)}`).join(" ");
    svg+=`<path d="${ar}" fill="${d.c}" opacity="0.06"/><path d="${ln}" fill="none" stroke="${d.c}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
    vp.forEach((p,pi)=>{svg+=`<circle cx="${pl+xs(p.i)}" cy="${pt+ys(p.x)}" r="${pi===vp.length-1?3:1.5}" fill="${d.c}"/>`;});
  });
  document.getElementById("lc").innerHTML=svg;
}

function renderGauges(f){
  document.getElementById("gg").innerHTML=[
    {k:"csat",l:"CSAT",t:94},{k:"sla",l:"SLA",t:90},{k:"ttr",l:"TTR",t:90}
  ].map(k=>`<div class="gi"><div class="gl">${k.l}</div>${gaugeSVG(avg(f[k.k]),k.t)}</div>`).join("");
}

function gaugeSVG(val,tgt){
  const sz=84,r=32,cx=sz/2,cy=sz/2+4;
  if(val==null)return`<svg width="${sz}" height="${sz/2+18}"><text x="${cx}" y="${cy}" text-anchor="middle" font-size="13" fill="#9e9d97">—</text></svg>`;
  const pct=Math.min(val/100,1),tp=tgt/100;
  const arc=(p,r)=>{const a=Math.PI*(1-p);return`${cx+r*Math.cos(Math.PI)},${cy} A${r},${r} 0 0,1 ${(cx+r*Math.cos(a)).toFixed(2)},${(cy-r*Math.sin(a)).toFixed(2)}`;};
  const fill=val>=tgt?"#1D9E75":val>=tgt-5?"#BA7517":"#A32D2D";
  const tx=(cx+(r-10)*Math.cos(Math.PI*(1-tp))).toFixed(2),ty=(cy-(r-10)*Math.sin(Math.PI*(1-tp))).toFixed(2);
  return`<svg width="${sz}" height="${sz/2+18}" style="display:block;margin:0 auto">
    <path d="M${arc(1,r)}" fill="none" stroke="#e5e4e0" stroke-width="6" stroke-linecap="round"/>
    <path d="M${arc(pct,r)}" fill="none" stroke="${fill}" stroke-width="6" stroke-linecap="round"/>
    <line x1="${cx}" y1="${cy}" x2="${tx}" y2="${ty}" stroke="#aaa" stroke-width="1.5" stroke-dasharray="2,2"/>
    <text x="${cx}" y="${cy+2}" text-anchor="middle" font-size="13" font-weight="600" fill="${fill}">${val.toFixed(1)}%</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="9" fill="#9e9d97">target ${tgt}%</text>
  </svg>`;
}

function renderIC(f){
  const ps=sum(f.incoming),ts=sum(S.data.incoming);
  document.getElementById("ic").innerHTML=`
    <div class="ichip" style="border-left:3px solid var(--coral)"><div class="icl">Período</div><div class="icv">${Math.round(ps).toLocaleString("es-AR")}</div></div>
    <div class="ichip" style="border-left:3px solid #888780"><div class="icl">Total 2025-26</div><div class="icv">${Math.round(ts).toLocaleString("es-AR")}</div></div>`;
}

function renderBC(){
  const vals=S.data.incoming,labs=S.weeks.map(w=>w.label);
  const vld=vals.filter(x=>x!=null);if(!vld.length)return;
  const mx=Math.max(...vld)*1.1,W=600,H=130,pl=44,pr=8,pt=8,pb=26,iW=W-pl-pr,iH=H-pt-pb;
  const bW=Math.max(4,(iW/labs.length)-3);
  let svg="";
  [0,.5,1].forEach(t=>{const v=mx*t,y=iH*(1-t);svg+=`<line x1="${pl}" y1="${pt+y}" x2="${pl+iW}" y2="${pt+y}" stroke="#e5e4e0" stroke-width="0.5"/><text x="${pl-4}" y="${pt+y+4}" text-anchor="end" font-size="9" fill="#9e9d97">${Math.round(v).toLocaleString("es-AR")}</text>`;});
  labs.forEach((l,i)=>{
    const v=vals[i],x=pl+(i/labs.length)*iW+(iW/labs.length-bW)/2,bH=v!=null?(v/mx)*iH:0;
    if(v!=null)svg+=`<rect x="${x.toFixed(1)}" y="${(pt+iH-bH).toFixed(1)}" width="${bW}" height="${bH.toFixed(1)}" fill="#D85A30" rx="2" opacity="0.85"/>`;
    if(i%(Math.ceil(labs.length/7))===0)svg+=`<text x="${(x+bW/2).toFixed(1)}" y="${pt+iH+16}" text-anchor="middle" font-size="9" fill="#9e9d97">${l}</text>`;
  });
  document.getElementById("bc").innerHTML=svg;
}
